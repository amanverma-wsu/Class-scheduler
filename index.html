<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class Scheduler</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Class Scheduler</h1>
      <p>Build, track, and share your weekly class plan for free.</p>
    </header>

    <main>
      <section class="panel">
        <h2>Add a class</h2>
        <form id="class-form">
          <label>
            Course
            <input required id="course" placeholder="CPTS 121" />
          </label>

          <label>
            Instructor
            <input id="instructor" placeholder="Dr. Kim" />
          </label>

          <label>
            Location
            <input id="location" placeholder="Todd 216" />
          </label>

          <div class="row">
            <label>
              Start
              <input required id="start" type="time" />
            </label>
            <label>
              End
              <input required id="end" type="time" />
            </label>
          </div>

          <fieldset>
            <legend>Days</legend>
            <label><input type="checkbox" value="Mon" />Mon</label>
            <label><input type="checkbox" value="Tue" />Tue</label>
            <label><input type="checkbox" value="Wed" />Wed</label>
            <label><input type="checkbox" value="Thu" />Thu</label>
            <label><input type="checkbox" value="Fri" />Fri</label>
            <label><input type="checkbox" value="Sat" />Sat</label>
            <label><input type="checkbox" value="Sun" />Sun</label>
          </fieldset>

          <label>
            Color
            <input id="color" type="color" value="#6f7eff" />
          </label>

          <button type="submit">Add class</button>
        </form>

        <div class="actions">
          <button id="export-json">Export JSON</button>
          <button id="import-json">Import JSON</button>
          <button id="export-csv">Export CSV</button>
          <button id="share-link">Copy Share Link</button>
          <button id="clear-all" class="danger">Clear All</button>
          <input id="import-file" type="file" accept="application/json" hidden />
        </div>

        <p id="status" role="status" aria-live="polite"></p>
      </section>

      <section class="panel">
        <h2>Your classes</h2>
        <ul id="class-list"></ul>
      </section>

      <section class="panel full">
        <h2>Weekly view</h2>
        <div id="calendar" class="calendar"></div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
